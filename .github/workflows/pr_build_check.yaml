name: PR Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: en/package-lock.json

      - name: Install dependencies
        run: |
          cd en/
          npm ci

      - name: Build Docusaurus site
        run: |
          cd en/
          npm run build
        env:
          BASE_URL: /docs-integrator/
